<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Interactive decision tree for identifying common Malaysian Arhopala (Oak Blue) butterfly species.">
  <meta name="theme-color" content="#2d5a27">
  <title>Arhopala ID — Malaysian Oak Blue Butterflies</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="loading" role="status" aria-live="polite">
    <div class="spinner" aria-hidden="true"></div>
    <span>Loading identification key…</span>
  </div>

  <!-- Persistent menu overlay — lives outside #app so render() never wipes it -->
  <div id="menu-overlay" class="menu-overlay" role="dialog" aria-modal="true" aria-label="Species Search">
    <div class="menu-panel">
      <div class="menu-header">
        <button id="back-to-search" class="back-to-search" style="display:none" aria-label="Back to search results">
          ← Results
        </button>
        <h2 class="menu-title">Species Search</h2>
        <button id="menu-close" class="menu-close" aria-label="Close menu">✕</button>
      </div>

      <div id="search-pane">
        <div class="search-box">
          <input id="search-input" type="search" placeholder="Search by name…"
                 autocomplete="off" spellcheck="false" aria-label="Search species">
          <p id="search-count" class="search-count"></p>
        </div>
        <div id="search-results" class="search-results" role="list"></div>
      </div>

      <div id="species-detail" class="species-detail" style="display:none"></div>
    </div>
  </div>

  <div id="app" style="display:none;" role="main"></div>

  <noscript>
    <div style="padding:2rem;text-align:center;font-family:sans-serif;">
      <p>This identification tool requires JavaScript to run.<br>
      Please enable JavaScript in your browser and reload the page.</p>
    </div>
  </noscript>

  <script src="js/app.js"></script>
</body>
</html>
